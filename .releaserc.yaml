branches: ["main"]
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - breaking: true
          release: minor
  - "@semantic-release/release-notes-generator"
  # Pin workspace "*" deps to the release version before npm publish so the
  # facade/server/lite tarballs depend on same-version core/lite/server (canary
  # prerelease.yml does the same rewrite). Multi @semantic-release/npm pkgRoot
  # entries share one nextRelease.version; order is dependency order.
  - "./scripts/semantic-release-pin-workspace-deps.cjs"
  - - "@semantic-release/npm"
    - pkgRoot: packages/core
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/lite
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/server
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/cli
      npmPublish: true
  - - "@semantic-release/git"
    - assets:
        - package.json
        - package-lock.json
        - packages/*/package.json
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
  - "@semantic-release/github"
