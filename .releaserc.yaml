branches: ["main"]
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - breaking: true
          release: minor
  - "@semantic-release/release-notes-generator"
  - - "@semantic-release/npm"
    - pkgRoot: packages/core
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/lite
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/server
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/cli
      npmPublish: true
  # Pin workspace "*" deps to the release version after npm has bumped each
  # workspace version, but before publish/git. Running this before npm's prepare
  # makes npm try to resolve future workspace versions from the registry.
  - "./scripts/semantic-release-pin-workspace-deps.cjs"
  - - "@semantic-release/git"
    - assets:
        - package.json
        - package-lock.json
        - packages/*/package.json
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
  - "@semantic-release/github"
