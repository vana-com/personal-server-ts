branches: ["main"]
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - breaking: true
          release: minor
  - "@semantic-release/release-notes-generator"
  # Version every workspace and pin internal dependencies before any npm
  # plugin runs `npm version`/packs a workspace. Doing this atomically keeps
  # npm from resolving not-yet-published sibling versions from the registry.
  - "./scripts/semantic-release-pin-workspace-deps.cjs"
  - - "@semantic-release/npm"
    - pkgRoot: packages/core
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/lite
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/server
      npmPublish: true
  - - "@semantic-release/npm"
    - pkgRoot: packages/cli
      npmPublish: true
  - "@semantic-release/github"
