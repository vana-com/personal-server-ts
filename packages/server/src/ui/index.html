<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Server — Dev UI</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface-2: #1e1e1e;
        --border: #2a2a2a;
        --text: #e0e0e0;
        --text-dim: #808080;
        --accent: #00ff88;
        --accent-dim: #00cc6a;
        --error: #ff4444;
        --warn: #ffaa00;
        --mono:
          "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        --radius: 4px;
      }

      body {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--accent);
      }

      .header-spacer {
        flex: 1;
      }

      .runtime-picker {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .runtime-picker select {
        width: auto;
        min-width: 128px;
      }

      header .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      nav {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        overflow-x: auto;
      }

      nav button {
        font-family: var(--mono);
        font-size: 12px;
        padding: 10px 16px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-dim);
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.15s,
          border-color 0.15s;
      }

      nav button:hover {
        color: var(--text);
      }
      nav button.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      main {
        padding: 20px;
        max-width: 1200px;
      }

      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 16px;
      }

      .card-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
        margin-bottom: 12px;
      }

      .kv-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 16px;
      }

      .kv-grid .label {
        color: var(--text-dim);
      }
      .kv-grid .value {
        color: var(--text);
        word-break: break-all;
      }
      .kv-grid .value.ok {
        color: var(--accent);
      }
      .kv-grid .value.err {
        color: var(--error);
      }
      .kv-grid .value.warn {
        color: var(--warn);
      }

      textarea,
      input,
      select {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        width: 100%;
        outline: none;
        transition: border-color 0.15s;
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: var(--accent);
      }

      textarea {
        resize: vertical;
        min-height: 300px;
      }

      button.btn {
        font-family: var(--mono);
        font-size: 12px;
        padding: 8px 16px;
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }

      button.btn:hover {
        background: var(--accent);
        color: var(--bg);
      }
      button.btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button.btn.secondary {
        border-color: var(--border);
        color: var(--text-dim);
      }
      button.btn.secondary:hover {
        background: var(--surface-2);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .toolbar input,
      .toolbar select {
        width: auto;
        min-width: 120px;
      }

      .msg {
        padding: 8px 12px;
        border-radius: var(--radius);
        font-size: 12px;
        margin-bottom: 12px;
      }

      .msg.ok {
        background: rgba(0, 255, 136, 0.1);
        color: var(--accent);
        border: 1px solid rgba(0, 255, 136, 0.2);
      }
      .msg.err {
        background: rgba(255, 68, 68, 0.1);
        color: var(--error);
        border: 1px solid rgba(255, 68, 68, 0.2);
      }

      pre.json {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 12px;
        max-height: 500px;
        overflow-y: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th,
      td {
        text-align: left;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }

      th {
        color: var(--text-dim);
        font-weight: 500;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }

      td {
        color: var(--text);
      }

      tr:hover td {
        background: var(--surface-2);
      }

      .empty {
        color: var(--text-dim);
        font-style: italic;
        padding: 20px 0;
        text-align: center;
      }

      .loading::after {
        content: "";
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>

      <div class="status-dot"></div>
      <h1>PERSONAL SERVER</h1>
      <div class="header-spacer"></div>
      <label class="runtime-picker">
        <span>Runtime</span>
        <select id="runtime-select">

    <nav id="tabs">

      <button data-tab="config">Config</button>
      <button data-tab="data">Data</button>
      <button data-tab="grants">Grants</button>
      <button data-tab="logs">Access Logs</button>
      <button data-tab="api">API Tester</button>
      <button data-tab="connect">Connect</button>
    </nav>

    <main>

          <div class="toolbar">

      </div>

        </div>
      </div>

          >
          <button class="btn" id="submit-data-btn">Submit</button>

        </div>
        <div class="card">
          <div class="card-title">Data Scopes</div>
          <div class="toolbar">
            <button class="btn" id="refresh-data-btn">Refresh</button>

      <!-- Grants Panel -->
      <div id="panel-grants" class="panel">

          />

              margin-bottom: 4px;
              font-size: 11px;

            "
            >Deep Link URL</label

            placeholder="Paste deep link URL from the test builder app"

            <div class="kv-grid" id="connect-parsed-info"></div>

              flex-wrap: wrap;
              margin-bottom: 12px;
            "

              2. Create Grant
            </button>
            <button class="btn" id="connect-approve-btn" disabled>
              3. Approve Session
            </button>
          </div>

            <button class="btn" id="connect-auto-btn" disabled>
              Auto-Approve All
            </button>

              Deny
            </button>

            id="connect-log"
            style="
              background: var(--surface-2);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              padding: 8px 12px;
              font-size: 11px;
              max-height: 300px;

            "

    <script>
      const TOKEN = "__DEV_TOKEN__";
      const BASE = window.location.origin;
      window.__PS_LITE_BOOTSTRAP__ = "__PS_LITE_BOOTSTRAP_JSON__";
      const runtimeState = {
        active: "node",
        registration: { ownerPrivateKeyConfigured: false },
      };

      // --- DOM helpers ---
      function el(id) {
        return document.getElementById(id);
      }
      function clearChildren(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }
      function text(str) {
        return document.createTextNode(String(str != null ? str : ""));
      }

      function createEl(tag, attrs, children) {
        const e = document.createElement(tag);
        if (attrs) {
          for (const [k, v] of Object.entries(attrs)) {
            if (k === "style" && typeof v === "object") {
              Object.assign(e.style, v);
            } else if (k.startsWith("on") && typeof v === "function") {
              e.addEventListener(k.slice(2), v);
            } else {
              e.setAttribute(k, v);
            }
          }
        }
        if (children) {
          for (const c of Array.isArray(children) ? children : [children]) {
            if (typeof c === "string") e.appendChild(text(c));
            else if (c) e.appendChild(c);
          }
        }
        return e;
      }

      function showMsg(container, message, type) {
        clearChildren(container);
        const div = createEl("div", { class: "msg " + type });
        div.textContent = message;
        container.appendChild(div);
      }

      function showJson(container, data) {
        clearChildren(container);
        const pre = createEl("pre", { class: "json" });
        pre.textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
        container.appendChild(pre);
      }

      function showEmpty(container, message) {
        clearChildren(container);
        const div = createEl("div", { class: "empty" });
        div.textContent = message;
        container.appendChild(div);
      }

      function showLoading(container) {
        clearChildren(container);
        const span = createEl("span", { class: "loading" });
        span.textContent = "Loading";
        container.appendChild(span);
      }

      // --- Tabs ---
      el("tabs").addEventListener("click", function (e) {
        if (e.target.tagName !== "BUTTON") return;
        document.querySelectorAll("#tabs button").forEach(function (b) {
          b.classList.remove("active");
        });
        document.querySelectorAll(".panel").forEach(function (p) {
          p.classList.remove("active");
        });
        e.target.classList.add("active");
        el("panel-" + e.target.dataset.tab).classList.add("active");

        var tab = e.target.dataset.tab;
        if (tab === "health") loadHealth();
        if (tab === "config") loadConfig();
        if (tab === "data") loadScopes();
        if (tab === "grants") loadGrants();
        if (tab === "logs") loadAccessLogs();
      });

      // --- Fetch helper ---
      async function api(path, opts) {
        opts = opts || {};
        var headers = Object.assign(
          { Authorization: "Bearer " + TOKEN },
          opts.headers || {},
        );
        var res = await fetch(
          BASE + path,
          Object.assign({}, opts, { headers: headers }),
        );
        var txt = await res.text();
        var json;
        try {
          json = JSON.parse(txt);
        } catch (e) {
          json = txt;
        }
        return { status: res.status, ok: res.ok, data: json };
      }

      async function runtimeApi(path, opts) {
        return runtimeState.active === "browser"
          ? psLiteApiRequest(path, opts)
          : api(path, opts);
      }

      function runtimeName() {
        return runtimeState.active === "browser" ? "Browser" : "Node";
      }

      async function loadRegistrationStatus() {
        try {
          var result = await api("/ui/api/registration");
          if (result.ok && result.data) {
            runtimeState.registration = result.data;
          }
        } catch (e) {
          runtimeState.registration = { ownerPrivateKeyConfigured: false };
        }
        updateRegisterButton();
      }

      function selectedPanel() {
        var active = document.querySelector("#tabs button.active");
        return active ? active.dataset.tab : "health";
      }

      function refreshSelectedPanel() {
        var tab = selectedPanel();
        if (tab === "health") loadHealth();
        if (tab === "config") loadConfig();
        if (tab === "data") loadScopes();
        if (tab === "grants") loadGrants();
        if (tab === "logs") loadAccessLogs();
      }

      function updateRegisterButton() {
        var btn = el("register-node-server-btn");
        if (!btn) return;
        btn.disabled = !runtimeState.registration.ownerPrivateKeyConfigured;
        btn.title = btn.disabled
          ? "Set VANA_OWNER_PRIVATE_KEY to register servers"
          : "Register selected runtime";
      }

      async function selectedHealth() {
        if (runtimeState.active === "node") return api("/health");

        var result = await psLiteClient().status();
        var data = result.data || {};
        var runtime = data.runtime || {};
        var relay = data.relay || {};
        var registration = runtime.registration;
        if (registration && relay.publicUrl) {
          registration = Object.assign({}, registration, {
            serverUrl: relay.publicUrl,
          });
        }
        return {
          status: result.status,
          ok: result.ok,
          data: Object.assign({}, runtime, {
            apiOrigin: relay.publicUrl || runtime.apiOrigin,
            registration: registration,
            relay: relay,
            runtime: {
              kind: "ps-lite",
              available: runtime.active !== false,
            },
          }),
        };
      }

      el("runtime-select").addEventListener("change", function (e) {
        runtimeState.active = e.target.value;
        el("node-registration-status").textContent = "";
        refreshSelectedPanel();
      });

      // --- Health ---
      async function loadHealth() {
        var container = el("health-content");
        try {
          await loadRegistrationStatus();
          var result = await selectedHealth();
          var d = result.data;
          clearChildren(container);
          var items = [
            ["runtime", runtimeName(), result.ok ? "ok" : "err"],
            ["status", d.status, d.status === "healthy" ? "ok" : "err"],
            ["version", d.version || "\u2014", ""],
            [
              "uptime",
              typeof d.uptime === "number" ? formatUptime(d.uptime) : "\u2014",
              "",
            ],
            [
              "api url",
              d.apiOrigin || BASE,
              d.apiOrigin && d.apiOrigin !== BASE ? "ok" : "warn",
            ],
            ["owner", d.owner ?? "not configured", d.owner ? "ok" : "err"],
          ];
          if (runtimeState.active === "browser") {
            items.push([
              "relay",
              d.relay && d.relay.connected
                ? "connected"
                : d.relay
                  ? d.relay.status
                  : "disconnected",
              d.relay && d.relay.connected ? "ok" : "warn",
            ]);
          } else if (d.tunnel) {
            items.push([
              "tunnel",
              d.tunnel.status || "unknown",
              d.tunnel.publicUrl ? "ok" : "warn",
            ]);
          }
          if (d.identity) {
            var registered =
              d.registration && typeof d.registration.registered === "boolean"
                ? d.registration.registered
                : d.identity.serverId !== null;
            items.push([
              "address",
              d.identity.address,
              registered ? "ok" : "warn",
            ]);
            items.push(["publicKey", truncAddr(d.identity.publicKey), ""]);
            items.push([
              "identity",
              registered ? "registered" : "not registered",
              registered ? "ok" : "warn",
            ]);
          } else {
            items.push(["identity", "not configured", ""]);
          }
          for (var i = 0; i < items.length; i++) {
            var lbl = createEl("span", { class: "label" });
            lbl.textContent = items[i][0];
            var val = createEl("span", {
              class: "value" + (items[i][2] ? " " + items[i][2] : ""),
            });
            val.textContent = items[i][1];
            // Copy-on-click for publicKey and API URLs
            if (
              (items[i][0] === "publicKey" && d.identity) ||
              items[i][0] === "api url"
            ) {
              var fullValue =
                items[i][0] === "publicKey" && d.identity
                  ? d.identity.publicKey
                  : items[i][1];
              val.style.cursor = "pointer";
              val.title = "Click to copy";
              val.addEventListener(
                "click",
                (function (copyValue, displayValue) {
                  return function () {
                    navigator.clipboard.writeText(copyValue);
                    val.textContent = "copied!";
                    setTimeout(function () {
                      val.textContent = displayValue;
                    }, 1200);
                  };
                })(fullValue, items[i][1]),
              );
            }
            container.appendChild(lbl);
            container.appendChild(val);
          }
          if (d.identity && !(d.registration && d.registration.registered)) {
            var noteEl = createEl("span", {
              class: "label",
              style: { gridColumn: "1 / -1", marginTop: "8px" },
            });
            noteEl.textContent = runtimeState.registration
              .ownerPrivateKeyConfigured
              ? "Register this runtime once the public API URL is reachable."
              : "Set VANA_OWNER_PRIVATE_KEY to enable server registration.";
            noteEl.style.color = "var(--text-dim)";
            noteEl.style.fontSize = "11px";
            noteEl.style.fontStyle = "italic";
            container.appendChild(noteEl);
          }
        } catch (e) {
          clearChildren(container);
          var lbl2 = createEl("span", { class: "label" });
          lbl2.textContent = "status";
          var val2 = createEl("span", { class: "value err" });
          val2.textContent = "unreachable";
          container.appendChild(lbl2);
          container.appendChild(val2);
        }
      }

        var m = Math.floor((s % 3600) / 60);
        var sec = s % 60;

      }

      // --- Data ---
      async function loadScopes() {
        var container = el("data-scopes");
        el("data-detail").style.display = "none";
        showLoading(container);

        try {
          var result = await runtimeApi("/v1/data?limit=100");
          if (!result.ok) {
            showJson(container, result.data);
            return;
          }
          if (!result.data.scopes || result.data.scopes.length === 0) {
            showEmpty(container, "No " + runtimeName() + " data scopes found.");
            return;
          }

          var syncResult = await runtimeApi("/v1/sync/status", {
            auth: "owner",
          }).catch(function (e) {
            return { ok: false, data: { error: e.message } };
          });
          var health = await selectedHealth().catch(function () {
            return { data: {} };
          });
          var latestByScope = {};
          var fileIds = [];
          for (var vIdx = 0; vIdx < result.data.scopes.length; vIdx++) {
            var scopeItem = result.data.scopes[vIdx];
            var scopeName =
              typeof scopeItem === "string"
                ? scopeItem
                : scopeItem.scope || JSON.stringify(scopeItem);
            var versions = await runtimeApi(
              "/v1/data/" + encodeURIComponent(scopeName) + "/versions?limit=1",
            ).catch(function (e) {
              return { ok: false, data: { error: e.message } };
            });
            var latest =
              versions.ok &&
              versions.data &&
              versions.data.versions &&
              versions.data.versions.length > 0
                ? versions.data.versions[0]
                : null;
            latestByScope[scopeName] = latest;
            if (latest && latest.fileId) fileIds.push(latest.fileId);
          }
          var rpcFiles = await verifyRpcFiles(
            health.data && health.data.gatewayUrl,
            Array.from(new Set(fileIds)),
          ).catch(function () {
            return {};
          });

          clearChildren(container);
          var table = createEl("table");
          var thead = createEl("thead");
          var headRow = createEl("tr", null, [
            createEl("th", null, "Scope"),
            createEl("th", null, "Local"),
            createEl("th", null, "RPC"),
            createEl("th", null, "Sync"),
            createEl("th", null, "Actions"),
          ]);
          thead.appendChild(headRow);
          table.appendChild(thead);

          var tbody = createEl("tbody");
          for (var i = 0; i < result.data.scopes.length; i++) {
            var scope = result.data.scopes[i];
            var s =
              typeof scope === "string"
                ? scope
                : scope.scope || JSON.stringify(scope);
            var tr = createEl("tr");
            var tdScope = createEl("td");
            tdScope.textContent = s;
            var latestVersion = latestByScope[s];
            var tdLocal = createEl("td");
            tdLocal.textContent =
              latestVersion && latestVersion.fileId ? "file id" : "unsynced";
            tdLocal.style.color =
              latestVersion && latestVersion.fileId
                ? "var(--accent)"
                : "var(--warn)";
            var tdRpc = createEl("td");
            if (latestVersion && latestVersion.fileId) {
              var rpc = rpcFiles[latestVersion.fileId];
              tdRpc.textContent = rpc
                ? rpc.registered
                  ? "registered"
                  : "missing"
                : "unknown";
              tdRpc.style.color =
                rpc && rpc.registered
                  ? "var(--accent)"
                  : rpc
                    ? "var(--error)"
                    : "var(--text-dim)";
            } else {
              tdRpc.textContent = "\u2014";
              tdRpc.style.color = "var(--text-dim)";
            }
            var tdSync = createEl("td");
            var syncData = syncResult.data || {};
            tdSync.textContent =
              syncData.enabled === false
                ? "disabled"
                : syncData.running
                  ? "running"
                  : syncResult.ok
                    ? "idle"
                    : "unavailable";
            tdSync.style.color =
              syncData.enabled === false
                ? "var(--text-dim)"
                : syncResult.ok
                  ? "var(--accent)"
                  : "var(--warn)";
            var tdActions = createEl("td");
            var btnView = createEl("button", { class: "btn secondary" });
            btnView.textContent = "View Latest";
            btnView.addEventListener(
              "click",
              (function (sc) {
                return function () {
                  viewScope(sc);
                };
              })(s),
            );
            var btnVer = createEl("button", {
              class: "btn secondary",
              style: { marginLeft: "8px" },
            });
            btnVer.textContent = "Versions";
            btnVer.addEventListener(
              "click",
              (function (sc) {
                return function () {
                  viewVersions(sc);
                };
              })(s),
            );
            tdActions.appendChild(btnView);
            tdActions.appendChild(btnVer);
            tr.appendChild(tdScope);
            tr.appendChild(tdLocal);
            tr.appendChild(tdRpc);
            tr.appendChild(tdSync);
            tr.appendChild(tdActions);
            tbody.appendChild(tr);
          }
          table.appendChild(tbody);
          container.appendChild(table);
        } catch (e) {
          showMsg(container, "Error: " + e.message, "err");
        }
      }

      async function submitData() {
        var msg = el("add-data-msg");
        clearChildren(msg);

        var scope = el("add-data-scope").value.trim();
        if (!scope) {
          showMsg(msg, "Scope is required.", "err");
          return;
        }

        var raw = el("add-data-json").value.trim();
        var parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (e) {
          showMsg(msg, "Invalid JSON: " + e.message, "err");
          return;
        }

        if (
          parsed === null ||
          typeof parsed !== "object" ||
          Array.isArray(parsed)
        ) {
          showMsg(
            msg,
            "JSON must be a plain object (not array or null).",
            "err",
          );
          return;
        }

        try {
          var result = await runtimeApi(
            "/v1/data/" + encodeURIComponent(scope),
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(parsed),
            },
          );
          if (result.ok) {
            var collectedAt =
              (result.data && result.data.collectedAt) || "unknown";
            showMsg(
              msg,
              'Stored data for scope "' +
                scope +
                '" (collectedAt: ' +
                collectedAt +
                ")",
              "ok",
            );
            loadScopes();
          } else {
            var errCode =
              (result.data && result.data.error && result.data.error.code) ||
              "";
            var errMsg =
              (result.data && result.data.error && result.data.error.message) ||
              "Request failed (" + result.status + ")";
            showMsg(msg, errCode ? errCode + ": " + errMsg : errMsg, "err");
          }
        } catch (e) {
          showMsg(msg, "Error: " + e.message, "err");
        }
      }

      // --- API Tester ---
      async function sendApiRequest() {
        var method = el("api-method").value;
        var path = el("api-path").value;
        var bodyText = el("api-body").value.trim();
        var statusEl2 = el("api-status");
        var responseEl = el("api-response");

        statusEl2.textContent = "Sending...";
        responseEl.textContent = "";

        var opts = { method: method };
        if (bodyText && (method === "POST" || method === "PUT")) {
          opts.headers = { "Content-Type": "application/json" };
          opts.body = bodyText;
        }

        try {
          var result = await runtimeApi(path, opts);
          var color =
            result.status < 300
              ? "var(--accent)"
              : result.status < 500
                ? "var(--warn)"
                : "var(--error)";
          clearChildren(statusEl2);
          var statusSpan = createEl("span");
          statusSpan.textContent = result.status;
          statusSpan.style.color = color;
          statusEl2.appendChild(statusSpan);
          statusEl2.appendChild(text(" " + method + " " + path));
          responseEl.textContent =
            typeof result.data === "string"
              ? result.data
              : JSON.stringify(result.data, null, 2);
        } catch (e) {
          clearChildren(statusEl2);
          var errSpan = createEl("span");
          errSpan.textContent = "Error";
          errSpan.style.color = "var(--error)";
          statusEl2.appendChild(errSpan);
          responseEl.textContent = e.message;
        }
      }

      // --- Browser Runtime Bridge ---
      function psLiteClient() {
        if (!window.psLiteDebug) {
          throw new Error("Browser runtime bundle is still loading");
        }
        return window.psLiteDebug;
      }

      async function psLiteApiRequest(path, opts) {
        opts = opts || {};
        var body;
        if (opts.body) {
          try {
            body = JSON.parse(opts.body);
          } catch (e) {
            body = opts.body;
          }
        }
        return psLiteClient().request(path, {
          method: opts.method || "GET",
          body: body,
          auth: opts.auth,
          headers: opts.headers,
        });
      }

      window.addEventListener("ps-lite-relay-status", function () {
        if (runtimeState.active === "browser") refreshSelectedPanel();
      });
      window.addEventListener("ps-lite-relay-log", function (event) {
        if (runtimeState.active === "browser" && selectedPanel() === "health") {
          el("node-registration-status").textContent = String(event.detail);
        }
      });

      // --- Connect Simulator ---
      var connectState = {
        relayUrl: "",
        sessionId: "",
        secret: "",
        granteeAddress: "",
        scopes: [],
        userAddress: "",
        serverAddress: "",
        grantId: "",
      };

      function connectLog(message, type) {
        var logEl = el("connect-log");
        var ts = new Date().toLocaleTimeString();
        var color =
          type === "ok"
            ? "var(--accent)"
            : type === "err"
              ? "var(--error)"
              : "var(--text-dim)";
        var line = createEl("div", { style: { color: color } });
        line.textContent = "[" + ts + "] " + message;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      async function relayFetch(path, opts) {
        opts = opts || {};
        var url = connectState.relayUrl + path;
        var res = await fetch(url, {
          method: opts.method || "GET",
          headers: Object.assign(
            { "Content-Type": "application/json" },
            opts.headers || {},
          ),
          body: opts.body,
        });
        var json = await res.json().catch(function () {
          return {};
        });
        return { status: res.status, ok: res.ok, data: json };
      }

      function connectParse() {
        var relayUrl = el("connect-relay-url").value.trim().replace(/\/+$/, "");
        var deepLink = el("connect-deep-link").value.trim();

        if (!deepLink) {
          connectLog("Deep link URL is required", "err");
          return;
        }

        var url;
        try {
          url = new URL(deepLink);
        } catch (e) {
          connectLog("Invalid deep link URL: " + e.message, "err");
          return;
        }

        var sessionId = url.searchParams.get("sessionId");
        var secret = url.searchParams.get("secret");

        if (!sessionId || !secret) {
          connectLog(
            "Deep link must contain sessionId and secret params",
            "err",
          );
          return;
        }

        connectState.relayUrl = relayUrl;
        connectState.sessionId = sessionId;
        connectState.secret = secret;

        // Show parsed info
        var info = el("connect-parsed-info");
        clearChildren(info);
        var items = [
          ["sessionId", sessionId],
          ["secret", secret.slice(0, 8) + "..."],
          ["relay", relayUrl],
        ];
        for (var i = 0; i < items.length; i++) {
          var lbl = createEl("span", { class: "label" });
          lbl.textContent = items[i][0];
          var val = createEl("span", { class: "value" });
          val.textContent = items[i][1];
          info.appendChild(lbl);
          info.appendChild(val);
        }
        el("connect-parsed").style.display = "block";
        el("connect-flow-card").style.display = "block";

        // Enable buttons
        el("connect-claim-btn").disabled = false;
        el("connect-auto-btn").disabled = false;
        el("connect-deny-btn").disabled = false;
        el("connect-grant-btn").disabled = true;
        el("connect-approve-btn").disabled = true;

        connectLog("Parsed deep link — sessionId: " + sessionId, "ok");
      }

      async function connectClaim() {
        connectLog("Claiming session...");
        el("connect-claim-btn").disabled = true;

        try {
          var result = await relayFetch("/v1/session/claim", {
            method: "POST",
            body: JSON.stringify({
              sessionId: connectState.sessionId,
              secret: connectState.secret,
            }),
          });

          if (!result.ok) {
            var errMsg =
              (result.data.error && result.data.error.message) ||
              "Claim failed (" + result.status + ")";
            connectLog("Claim failed: " + errMsg, "err");
            el("connect-claim-btn").disabled = false;
            return false;
          }

          connectState.granteeAddress =
            result.data.granteeAddress ||
            result.data.session?.granteeAddress ||
            "";
          connectState.scopes =
            result.data.scopes || result.data.session?.scopes || [];

          connectLog(
            "Session claimed — grantee: " +
              connectState.granteeAddress +
              ", scopes: [" +
              connectState.scopes.join(", ") +
              "]",
            "ok",
          );

          el("connect-grant-btn").disabled = false;
          return true;
        } catch (e) {
          connectLog("Claim error: " + e.message, "err");
          el("connect-claim-btn").disabled = false;
          return false;
        }
      }

      async function connectCreateGrant() {
        connectLog("Creating grant...");
        el("connect-grant-btn").disabled = true;

        try {
          // Get owner address from /health
          var healthResult = await api("/health");
          if (
            !healthResult.ok ||
            !healthResult.data ||
            !healthResult.data.owner
          ) {
            connectLog(
              "Could not get owner address from /health. Is VANA_MASTER_KEY_SIGNATURE set?",
              "err",
            );
            el("connect-grant-btn").disabled = false;
            return false;
          }
          connectState.userAddress = healthResult.data.owner;
          connectState.serverAddress =
            (healthResult.data.identity &&
              healthResult.data.identity.address) ||
            "";
          connectLog("Owner address: " + connectState.userAddress);

          // Create grant via POST /v1/grants
          var grantResult = await api("/v1/grants", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              granteeAddress: connectState.granteeAddress,
              scopes: connectState.scopes,
            }),
          });

          if (!grantResult.ok) {
            var errMsg =
              (grantResult.data.error && grantResult.data.error.message) ||
              "Create grant failed (" + grantResult.status + ")";
            connectLog("Grant creation failed: " + errMsg, "err");
            el("connect-grant-btn").disabled = false;
            return false;
          }

          connectState.grantId = String(grantResult.data.grantId);
          connectLog("Grant created — grantId: " + connectState.grantId, "ok");

          el("connect-approve-btn").disabled = false;
          return true;
        } catch (e) {
          connectLog("Grant error: " + e.message, "err");
          el("connect-grant-btn").disabled = false;
          return false;
        }
      }

      async function connectApprove() {
        connectLog("Approving session...");
        el("connect-approve-btn").disabled = true;

        try {
          var result = await relayFetch(
            "/v1/session/" + connectState.sessionId + "/approve",
            {
              method: "POST",
              body: JSON.stringify({
                secret: connectState.secret,
                grantId: connectState.grantId,
                userAddress: connectState.userAddress,
                serverAddress: connectState.serverAddress,
                scopes: connectState.scopes,
              }),
            },
          );

          if (!result.ok) {
            var errMsg =
              (result.data.error && result.data.error.message) ||
              "Approve failed (" + result.status + ")";
            connectLog("Approve failed: " + errMsg, "err");
            el("connect-approve-btn").disabled = false;
            return false;
          }

          connectLog("Session approved!", "ok");

          // Show result
          el("connect-result-card").style.display = "block";
          el("connect-result").textContent = JSON.stringify(
            {
              grantId: connectState.grantId,
              userAddress: connectState.userAddress,
              granteeAddress: connectState.granteeAddress,
              scopes: connectState.scopes,
              sessionId: connectState.sessionId,
            },
            null,
            2,
          );

          // Disable all buttons
          el("connect-auto-btn").disabled = true;
          el("connect-deny-btn").disabled = true;
          return true;
        } catch (e) {
          connectLog("Approve error: " + e.message, "err");
          el("connect-approve-btn").disabled = false;
          return false;
        }
      }

      async function connectDeny() {
        connectLog("Denying session...");

        try {
          var result = await relayFetch(
            "/v1/session/" + connectState.sessionId + "/deny",
            {
              method: "POST",
              body: JSON.stringify({
                secret: connectState.secret,
                reason: "Denied from Dev UI",
              }),
            },
          );

          if (!result.ok) {
            var errMsg =
              (result.data.error && result.data.error.message) ||
              "Deny failed (" + result.status + ")";
            connectLog("Deny failed: " + errMsg, "err");
            return;
          }

          connectLog("Session denied", "ok");

          // Disable all action buttons
          el("connect-claim-btn").disabled = true;
          el("connect-grant-btn").disabled = true;
          el("connect-approve-btn").disabled = true;
          el("connect-auto-btn").disabled = true;
          el("connect-deny-btn").disabled = true;
        } catch (e) {
          connectLog("Deny error: " + e.message, "err");
        }
      }

      async function connectAutoApprove() {
        el("connect-auto-btn").disabled = true;
        el("connect-deny-btn").disabled = true;
        connectLog("Starting auto-approve flow...");

        var ok = await connectClaim();
        if (!ok) {
          el("connect-auto-btn").disabled = false;
          el("connect-deny-btn").disabled = false;
          return;
        }

        ok = await connectCreateGrant();
        if (!ok) {
          el("connect-auto-btn").disabled = false;
          el("connect-deny-btn").disabled = false;
          return;
        }

        await connectApprove();
      }

      el("connect-parse-btn").addEventListener("click", connectParse);
      el("connect-claim-btn").addEventListener("click", connectClaim);
      el("connect-grant-btn").addEventListener("click", connectCreateGrant);
      el("connect-approve-btn").addEventListener("click", connectApprove);
      el("connect-deny-btn").addEventListener("click", connectDeny);
      el("connect-auto-btn").addEventListener("click", connectAutoApprove);

      // --- Utilities ---
      function truncAddr(addr) {
        if (!addr || addr.length < 12) return addr || "\u2014";
        return addr.slice(0, 6) + "..." + addr.slice(-4);
      }
    </script>
    <script type="module" src="/ui/ps-lite-debug.js"></script>
  </body>
</html>
