name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Checkout vana-sdk main
        run: git clone --branch main --depth 1 https://github.com/vana-com/vana-sdk.git ../vana-sdk
      - name: Build local vana-sdk
        working-directory: ../vana-sdk
        run: npm ci && npm run build --workspace @opendatalabs/vana-sdk
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:eslint
      - run: npm run format:check

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Checkout vana-sdk main
        run: git clone --branch main --depth 1 https://github.com/vana-com/vana-sdk.git ../vana-sdk
      - name: Build local vana-sdk
        working-directory: ../vana-sdk
        run: npm ci && npm run build --workspace @opendatalabs/vana-sdk
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
